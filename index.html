<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Power BI - Central Petrowax</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="menu-screen" id="menuScreen">
        <div class="menu-container">
            <h1>📊 Central Power BI Petrowax</h1>
            <p>Selecciona un informe o recurso (requiere autenticación)</p>
            <div class="cards" id="cardsContainer"></div>
        </div>
    </div>

    <div class="nav-bar" id="navBar">
        <button class="btn btn-outline" id="btnMenuInicio">🏠 Menú</button>
        <div id="dynamicNavButtons" style="display: inline-flex; gap: 0.6rem; flex-wrap: wrap;"></div>
        <button class="btn" id="btnManuales">📚 Manuales</button>
        <button class="btn btn-danger" id="btnLogout">🔒 Salir</button>
    </div>

    <div class="iframe-wrapper" id="iframeWrapper">
        <div class="iframe-container">
            <iframe id="dynamicIframe" title="Reporte Power BI" allowFullScreen="true"></iframe>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-card">
            <h3>🔐 Iniciar sesión</h3>
            <p>Ingresa tus credenciales</p>
            <input type="text" id="loginUser" placeholder="Usuario" autocomplete="off">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <div id="loginError" class="error-msg"></div>
            <div class="modal-buttons">
                <button class="btn-modal-cancel" id="modalCancelBtn">Cancelar</button>
                <button class="btn-modal-login" id="modalLoginBtn">Entrar</button>
            </div>
        </div>
    </div>

    <div id="manualModal" class="manual-modal">
        <div class="manual-modal-content">
            <h2>📚 Manuales por área</h2>
            <div id="manualesListado"></div>
            <button class="btn-cerrar-manual" id="btnCerrarManual">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
