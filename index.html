<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Power BI - Central Petrowax</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #0a0f1e;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Fondo animado */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(30, 60, 90, 0.4) 0%, rgba(10, 15, 30, 0.9) 100%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            z-index: -2;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="30" cy="30" r="2" fill="rgba(255,255,255,0.2)"/><circle cx="170" cy="80" r="1.5" fill="rgba(255,255,255,0.15)"/><circle cx="80" cy="150" r="2.5" fill="rgba(255,255,255,0.1)"/><circle cx="140" cy="180" r="1" fill="rgba(255,255,255,0.2)"/></svg>');
            background-repeat: repeat;
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
            animation: floatParticles 40s linear infinite;
        }

        @keyframes floatParticles {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }

        /* Pantalla de menú */
        .menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(2px);
            overflow-y: auto;
            padding: 1rem;
        }

        .menu-container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
            padding: 1rem;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-container h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a0b8d4, #4a6fa5);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes shine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-container p {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            color: #cbd5e6;
            margin-bottom: 2rem;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            width: 200px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(100, 180, 250, 0.6);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), 0 0 15px rgba(70, 130, 200, 0.3);
            background: rgba(255, 255, 255, 0.12);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }

        .card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #fff, #ccdeff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card p {
            font-size: 0.8rem;
            color: #b0c4e7;
        }

        /* Barra de navegación responsiva */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(16px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 0.6rem 1rem;
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            align-items: center;
            z-index: 1100;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            flex-wrap: wrap;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        .nav-bar.visible {
            transform: translateY(0);
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.35rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #eef4ff;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        @media (max-width: 640px) {
            .btn {
                padding: 0.3rem 0.6rem;
                font-size: 0.7rem;
            }
        }

        .btn-primary {
            background: #1e6f3f;
            border-color: #2e8f55;
        }
        .btn-primary:hover {
            background: #155a34;
        }
        .btn-outline {
            background: transparent;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.15);
        }
        .btn-danger {
            background: #dc2626;
            border-color: #ef4444;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }

        /* Contenedor del iframe */
        .iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 900;
            visibility: hidden;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 70px 0 0 0;
        }

        .iframe-wrapper.visible {
            visibility: visible;
        }

        .iframe-container {
            width: 100%;
            height: calc(100% - 70px);
            background: #1e2438;
            overflow: hidden;
            box-shadow: none;
            border: none;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
            padding: 1rem;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: rgba(20, 28, 45, 0.95);
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 340px;
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-card h3 {
            font-size: 1.4rem;
            color: white;
        }
        .modal-card p {
            color: #b0c4e7;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .modal-card input {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 0.8rem;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 1.5rem;
            background: rgba(0,0,0,0.4);
            color: white;
        }
        .modal-card input:focus {
            border-color: #1e6f3f;
            outline: none;
        }
        .modal-buttons {
            display: flex;
            gap: 0.8rem;
        }
        .modal-buttons button {
            flex: 1;
            padding: 0.5rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-modal-login {
            background: #1e6f3f;
            color: white;
        }
        .btn-modal-cancel {
            background: rgba(255,255,255,0.15);
            color: #eef4ff;
        }
        .error-msg {
            color: #ff8a7a;
            font-size: 0.75rem;
            margin-top: -0.3rem;
            margin-bottom: 0.6rem;
        }

        @media (max-width: 640px) {
            .card {
                width: 170px;
                padding: 1rem;
            }
            .card-icon {
                font-size: 2.5rem;
            }
            .card h3 {
                font-size: 1.2rem;
            }
            .card p {
                font-size: 0.7rem;
            }
            .iframe-wrapper {
                padding-top: 60px;
            }
            .iframe-container {
                height: calc(100% - 60px);
            }
            .nav-bar {
                padding: 0.4rem 0.5rem;
                gap: 0.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- Menú principal (contenedor dinámico) -->
    <div class="menu-screen" id="menuScreen">
        <div class="menu-container">
            <h1>📊 Central Power BI Petrowax</h1>
            <p>Selecciona un informe o recurso (requiere autenticación)</p>
            <div class="cards" id="cardsContainer"></div>
        </div>
    </div>

    <!-- Barra de navegación -->
    <div class="nav-bar" id="navBar">
        <button class="btn btn-outline" id="btnMenuInicio">🏠 Menú</button>
        <div id="dynamicNavButtons" style="display: inline-flex; gap: 0.6rem; flex-wrap: wrap;"></div>
        <button class="btn btn-danger" id="btnLogout">🔒 Salir</button>
    </div>

    <!-- Contenedor del iframe -->
    <div class="iframe-wrapper" id="iframeWrapper">
        <div class="iframe-container">
            <iframe id="dynamicIframe" title="Reporte Power BI" allowFullScreen="true"></iframe>
        </div>
    </div>

    <!-- Modal de login -->
    <div id="loginModal" class="modal">
        <div class="modal-card">
            <h3>🔐 Iniciar sesión</h3>
            <p id="modalSubtitle">Acceso al sistema</p>
            <input type="text" id="loginUser" placeholder="Usuario" autocomplete="off">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <div id="loginError" class="error-msg"></div>
            <div class="modal-buttons">
                <button class="btn-modal-cancel" id="modalCancelBtn">Cancelar</button>
                <button class="btn-modal-login" id="modalLoginBtn">Entrar</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DEFINICIÓN DE RECURSOS ====================
        const resources = {
            otif: {
                type: 'report',
                name: 'OTIF',
                icon: '📦',
                description: 'On-Time In-Full<br>Desempeño de entregas',
                url: 'https://app.powerbi.com/view?r=eyJrIjoiOTMzYTY4NmYtOGM1ZC00YzNhLTlmYTQtZjg4MGEwZGIyYWMwIiwidCI6IjA2ZjZlNmQ4LWY0OWMtNDZiZC1hYmIyLTE3YTY5YzU3NGNjYyJ9'
            },
            metricas: {
                type: 'report',
                name: 'Métricas',
                icon: '📈',
                description: 'Indicadores clave<br>y análisis de negocio',
                url: 'https://app.powerbi.com/view?r=eyJrIjoiNGQ4YjQ4ZmYtMGI3ZC00ZGI0LThkNGYtMjIzZGRjZjVkODkyIiwidCI6IjA2ZjZlNmQ4LWY0OWMtNDZiZC1hYmIyLTE3YTY5YzU3NGNjYyJ9'
            },
            inventario: {
                type: 'report',
                name: 'Inventario',
                icon: '🗒️',
                description: 'Indicador de<br>existencias',
                url: 'https://app.powerbi.com/view?r=eyJrIjoiNTMwMjVjYWEtNWQ5ZC00ZDY1LWFjMzUtNTdhZTkzNzUxYTk5IiwidCI6IjA2ZjZlNmQ4LWY0OWMtNDZiZC1hYmIyLTE3YTY5YzU3NGNjYyJ9'
            },
            manualProcesos: {
                type: 'external',
                name: 'Manual de Procesos',
                icon: '📘',
                description: 'Procedimientos, políticas<br>y buenas prácticas',
                url: '#'
            },
            ticketPromedio: {
                type: 'external',
                name: 'Ticket Promedio',
                icon: '⏱️',
                description: 'Indicador de tiempo<br>de resolución',
                url: '#'
            }
        };

        // ==================== PERMISOS ====================
        const userPermissions = {
            almacen: ['otif', 'metricas', 'inventario', 'manualProcesos'],
            ventas: ['otif', 'inventario', 'manualProcesos'],
            'mesa de control': ['otif', 'metricas', 'inventario', 'manualProcesos', 'ticketPromedio'],
            gerente: ['otif', 'metricas', 'inventario', 'manualProcesos', 'ticketPromedio'],
            admin: ['otif', 'metricas', 'inventario', 'manualProcesos', 'ticketPromedio'],
            gina: ['otif', 'metricas', 'inventario'],
            perla: ['metricas']   // Perla solo ve Métricas
        };

        const userPasswords = {
            almacen: '12345',
            ventas: '12345',
            'mesa de control': '13579',
            gerente: '13579',
            admin: '2235',
            gina: 'control',
            perla: 'logistica'
        };

        // ---------------------- ESTADO ----------------------
        let currentUser = null;
        let currentResource = null;
        let pendingResource = null;   // Ya no se usa para login inicial, pero se mantiene para coherencia

        // ---------------------- DOM ----------------------
        const menuScreen = document.getElementById('menuScreen');
        const navBar = document.getElementById('navBar');
        const iframeWrapper = document.getElementById('iframeWrapper');
        const dynamicIframe = document.getElementById('dynamicIframe');
        const cardsContainer = document.getElementById('cardsContainer');
        const dynamicNavButtons = document.getElementById('dynamicNavButtons');
        const loginModal = document.getElementById('loginModal');
        const modalSubtitle = document.getElementById('modalSubtitle');
        const loginUser = document.getElementById('loginUser');
        const loginPass = document.getElementById('loginPass');
        const loginError = document.getElementById('loginError');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalLoginBtn = document.getElementById('modalLoginBtn');
        const btnMenuInicio = document.getElementById('btnMenuInicio');
        const btnLogout = document.getElementById('btnLogout');

        // ---------------------- FUNCIONES ----------------------
        function isValidUser(username) {
            return userPasswords.hasOwnProperty(username);
        }
        function checkUserPassword(username, password) {
            return userPasswords[username] === password;
        }
        function getAllowedResources(username) {
            return userPermissions[username] || [];
        }

        // Muestra el modal de login (sin recurso pendiente, solo autenticación)
        function showLoginModal() {
            modalSubtitle.innerText = 'Ingresa tus credenciales';
            loginUser.value = '';
            loginPass.value = '';
            loginError.innerText = '';
            loginModal.classList.add('active');
        }

        function hideLoginModal() {
            loginModal.classList.remove('active');
        }

        // ⭐ Carga un informe (con la lógica especial para Perla en Métricas)
        function loadResource(resourceId) {
            if (!currentUser) return false;
            const resource = resources[resourceId];
            if (!resource) return false;

            if (resource.type === 'report') {
                let url = resource.url;
                // Si es Perla y es el informe Métricas, ocultar navegación inferior
                if (currentUser === 'perla' && resourceId === 'metricas') {
                    const separator = url.includes('?') ? '&' : '?';
                    url += `${separator}navContentPaneEnabled=false`;
                }
                dynamicIframe.src = url;
                dynamicIframe.title = resource.name;
                currentResource = resourceId;
                menuScreen.style.display = 'none';
                iframeWrapper.classList.add('visible');
                navBar.classList.add('visible');
            } else if (resource.type === 'external') {
                if (resource.url && resource.url !== '#') {
                    window.open(resource.url, '_blank');
                } else {
                    alert(`⚠️ El enlace para "${resource.name}" aún no está configurado.`);
                }
            }
            return true;
        }

        // Generar las tarjetas del menú según los permisos del usuario actual
        function renderMenuCards() {
            if (!currentUser) return;
            const allowed = getAllowedResources(currentUser);
            cardsContainer.innerHTML = '';
            allowed.forEach(resId => {
                const res = resources[resId];
                if (res) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('data-resource', resId);
                    card.innerHTML = `
                        <div class="card-icon">${res.icon}</div>
                        <h3>${res.name}</h3>
                        <p>${res.description}</p>
                    `;
                    card.addEventListener('click', () => {
                        if (currentResource === resId && res.type === 'report') return;
                        loadResource(resId);
                    });
                    cardsContainer.appendChild(card);
                }
            });
        }

        // Generar los botones de navegación (solo para informes Power BI)
        function renderNavButtons() {
            if (!currentUser) return;
            const allowed = getAllowedResources(currentUser);
            dynamicNavButtons.innerHTML = '';
            allowed.forEach(resId => {
                const res = resources[resId];
                if (res && res.type === 'report') {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerHTML = `${res.icon} ${res.name}`;
                    btn.addEventListener('click', () => {
                        if (currentResource !== resId) loadResource(resId);
                    });
                    dynamicNavButtons.appendChild(btn);
                }
            });
        }

        // Cerrar sesión y volver al menú principal
        function logoutAndGoToMenu() {
            currentUser = null;
            currentResource = null;
            dynamicIframe.src = 'about:blank';
            navBar.classList.remove('visible');
            iframeWrapper.classList.remove('visible');
            menuScreen.style.display = 'flex';
            menuScreen.style.opacity = '1';
            cardsContainer.innerHTML = '';
            dynamicNavButtons.innerHTML = '';
            hideLoginModal();
            // Mostrar modal de login nuevamente para que otro usuario pueda ingresar
            showLoginModal();
        }

        // Intentar login (sin recurso pendiente, solo autenticación)
        function attemptLogin() {
            const username = loginUser.value.trim().toLowerCase();
            const password = loginPass.value;
            if (!username || !password) {
                loginError.innerText = '❌ Ingrese usuario y contraseña';
                return;
            }
            if (!isValidUser(username)) {
                loginError.innerText = '❌ Usuario no registrado';
                return;
            }
            if (!checkUserPassword(username, password)) {
                loginError.innerText = '❌ Contraseña incorrecta';
                return;
            }

            // Login exitoso
            currentUser = username;
            hideLoginModal();

            // Renderizar las tarjetas y botones según sus permisos
            renderMenuCards();
            renderNavButtons();

            // Asegurar que el menú es visible y el iframe oculto
            menuScreen.style.display = 'flex';
            iframeWrapper.classList.remove('visible');
            navBar.classList.remove('visible');
            dynamicIframe.src = 'about:blank';
            currentResource = null;
        }

        // ---------------------- EVENTOS ----------------------
        btnMenuInicio.addEventListener('click', () => {
            if (currentUser) {
                menuScreen.style.display = 'flex';
                iframeWrapper.classList.remove('visible');
                navBar.classList.remove('visible');
                // No es necesario re-renderizar porque las tarjetas ya están, pero por si acaso
                renderMenuCards();
                renderNavButtons();
                dynamicIframe.src = 'about:blank';
                currentResource = null;
            } else {
                logoutAndGoToMenu();
            }
        });
        btnLogout.addEventListener('click', logoutAndGoToMenu);

        modalLoginBtn.addEventListener('click', attemptLogin);
        modalCancelBtn.addEventListener('click', () => {
            hideLoginModal();
            // Si no hay usuario después de cancelar, podemos dejar la pantalla de menú vacía, pero mostramos modal de nuevo?
            // Para evitar que se quede bloqueado, volvemos a mostrar modal tras un breve tiempo?
            if (!currentUser) {
                // Opcional: mostrar un mensaje flotante o reintentar
                setTimeout(() => {
                    if (!currentUser && !loginModal.classList.contains('active')) {
                        showLoginModal();
                    }
                }, 500);
            }
        });
        loginModal.addEventListener('click', (e) => {
            if (e.target === loginModal && !currentUser) {
                // No hacer nada, que no se cierre fácilmente, mejor no cerrar
                // Pero si quieres que se pueda cerrar, puedes comentar.
            }
        });
        loginUser.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptLogin(); });
        loginPass.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptLogin(); });

        // ---------------------- INICIALIZACIÓN ----------------------
        // Al cargar la página, mostrar modal de login automáticamente
        window.addEventListener('load', () => {
            if (!currentUser) {
                showLoginModal();
            }
        });

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        if (isMobile()) console.log("Vista optimizada para móviles");
    </script>
</body>
</html>
